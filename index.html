<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAURENZ WEEKE</title>
  <link rel="icon" type="image/png" href="images/sliceanimatedream6verynice.png">
  <link rel="shortcut icon" type="image/png" href="images/sliceanimatedream6verynice.png">
  <style>
    :root{color-scheme: light}
    *{box-sizing: border-box}
    body{
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
      overflow-y:auto;
      background-color:#f2f2f2;
      color:#000;
      font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight:700;
    }

    body::before{
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("images/sliceanimatedream6verynice.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 55%;
      background-color: #f2f2f2;
      z-index: -1;
      transition: filter 320ms ease, opacity 320ms ease, transform 320ms ease;
      transform-origin: center center;
    }

    body.image-hover::before { transform: scale(1.06); }
    body.work-open::before, body.about-open::before { filter: blur(10px); }

    body.work-open::before,
    body.about-open::before {
      filter: blur(10px);
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .page {
      padding: 3rem 4rem 4rem;
      width: min(360px, 34vw);
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 1;
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.7rem, 3vw, 2rem);
      margin: 0;
      letter-spacing: 0.08em;
      color: #000000;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .link-button {
      font: inherit;
      color: #000000;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      font-weight: 800;
      font-size: clamp(0.95rem, 1.3vw, 1rem);
      text-transform: uppercase;
      transition: transform 180ms ease, color 180ms ease;
      position: relative;
    }

    .link-button:hover {
      transform: scale(1.08);
      color: #111111;
    }

    .link-button.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 3px;
      background: #000000;
      border-radius: 2px;
    }

    .panel-shell {
      position: relative;
      flex: 1;
      overflow: hidden;
      min-height: 100vh;
    }

    .panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 260px;
      padding: 3rem 4rem 4rem 4rem;
      opacity: 0;
      transform: translateX(40px);
      pointer-events: none;
      transition: opacity 320ms ease, transform 320ms ease;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    @media (max-width: 1024px) {
      .page {
        width: min(300px, 32vw);
        padding: 2.25rem 2rem 2rem;
      }

      .panel {
        left: 220px;
        padding: 2.25rem 2rem 2rem;
      }
    }

    @media (max-width: 860px) {
      .container {
        flex-direction: column;
        min-height: auto;
      }

      .page {
        width: 100%;
        min-width: 0;
        padding: 1.5rem 1.25rem 1rem;
      }

      .panel-shell {
        min-height: 70vh;
        width: 100%;
      }

      .panel {
        display: none;
        position: relative;
        left: 0;
        right: 0;
        top: auto;
        bottom: auto;
        min-height: 60vh;
        padding: 1rem 1rem 1.5rem;
      }

      body.work-open .work-panel,
      body.about-open .about-panel {
        display: block;
      }

      .about-panel {
        padding-top: 1rem;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 1.25rem 1rem 0.75rem;
      }

      h1 {
        font-size: clamp(1.35rem, 6vw, 1.6rem);
      }

      .links {
        gap: 1rem;
        flex-wrap: wrap;
      }

      .panel-shell {
        min-height: auto;
      }

      .panel {
        min-height: 50vh;
      }
    }

    body.work-open .work-panel,
    body.about-open .about-panel {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .work-panel {
      display: grid;
      grid-template-columns: repeat(12, minmax(110px, 1fr));
      gap: 0.6rem;
      align-content: start;
      justify-content: center;
      justify-items: center;
      width: min(100%, 2200px);
      max-width: 2200px;
      padding-right: 2rem;
      margin: 0 auto;
      transform: none;
    }

    .work-box {
      width: 100%;
      max-width: 160px;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      background-clip: padding-box;
      padding: 0;
      cursor: pointer;
      transition: transform 220ms cubic-bezier(.2,.9,.2,1), box-shadow 200ms ease;
      transform-origin: center center;
    }

    .work-box:hover {
      /* remove direct hover scaling; proximity logic controls scale now */
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.18);
      z-index: 50;
    }

    .work-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 8px;
      filter: blur(12px);
      -webkit-filter: blur(12px);
      transition: filter 180ms ease, -webkit-filter 180ms ease;
    }

    .about-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding-top: 6rem;
    }

    .about-card {
      width: min(920px, 85%);
      max-width: 980px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 18px;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.08);
      padding: 3rem;
      display: grid;
      gap: 1.75rem;
    }

    .about-hero {
      min-height: 42vh;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .about-photo {
      min-height: 18vh;
      width: 100%;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    @media (max-width: 860px) {
      .work-panel {
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        padding-right: 0;
      }

      .work-box {
        max-width: none;
      }

      .about-card {
        width: min(100%, 100%);
        padding: 1.25rem;
      }

      .about-hero {
        min-height: 24vh;
      }

      .about-photo {
        min-height: 12vh;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    .panel::-webkit-scrollbar {
      width: 10px;
    }

    .panel::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 999px;
    }

    .panel::-webkit-scrollbar-track {
      background: transparent;
    }

    /* lightbox removed - images will not open in enlarged overlay */
  </style>
</head>
<body>
<!-- lightbox removed -->
  <div class="container">
    <div class="page">
      <h1>LAURENZ WEEKE</h1>
      <div class="links">
        <button class="link-button" type="button" id="workButton">GALLERY</button>
        <button class="link-button" type="button" id="aboutButton">ABOUT</button>
      </div>
    </div>

      <div class="panel-shell">
      <div class="panel work-panel" id="workPanel"></div>

      <div class="panel about-panel" id="aboutPanel">
        <div class="about-card">
          <div class="about-hero"></div>
          <div class="about-photo"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const workButton = document.getElementById('workButton');
    const aboutButton = document.getElementById('aboutButton');
    const body = document.body;

    workButton.addEventListener('click', () => {
      const active = workButton.classList.toggle('active');
      aboutButton.classList.remove('active');
      body.classList.toggle('work-open', active);
      body.classList.remove('about-open');
    });

    aboutButton.addEventListener('click', () => {
      const active = aboutButton.classList.toggle('active');
      workButton.classList.remove('active');
      body.classList.toggle('about-open', active);
      body.classList.remove('work-open');
    });

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    // lightbox removed - click-to-enlarge disabled

    function loadGalleryImages() {
      fetch('images/gallery.json')
        .then(response => response.json())
        .then(filenames => {
          // create a larger pool by repeating each image several times
          const copies = 4;
          let pool = [];
          for (let i = 0; i < copies; i++) pool = pool.concat(filenames);
          shuffleArray(pool);
          const workPanel = document.getElementById('workPanel');
          pool.forEach(name => {
            const box = document.createElement('div');
            box.className = 'work-box';
            const img = document.createElement('img');
            img.src = 'images/Gallery/' + encodeURIComponent(name);
            img.alt = '';
            img.title = '';
            img.loading = 'lazy';
            img.draggable = false;
            box.appendChild(img);
            workPanel.appendChild(box);
          });
        })
        .catch(() => {
          const workPanel = document.getElementById('workPanel');
          workPanel.textContent = 'Unable to load gallery images.';
        });
    }

    loadGalleryImages();

    function setupProximityHover() {
      const workPanel = document.getElementById('workPanel');
      let boxes = Array.from(workPanel.querySelectorAll('.work-box'));
      if (!boxes.length) return;

      const k = 10; // number of neighbors to affect (smaller neighborhood)
      const maxScale = 2; // hovered image scale
      const minNeighborScale = 1.03; // smallest visible neighbor scale
      const exponent = 1.25; // falloff shaping

      function applyProximity(target) {
        const rects = boxes.map(b => b.getBoundingClientRect());
        const tRect = target.getBoundingClientRect();
        const tCx = tRect.left + tRect.width / 2;
        const tCy = tRect.top + tRect.height / 2;

        const distances = boxes.map((b, i) => {
          const r = rects[i];
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const d = Math.hypot(cx - tCx, cy - tCy);
          return {b, d, i};
        });

        distances.sort((a, b) => a.d - b.d);

        distances.forEach((entry, rank) => {
          const el = entry.b;
          if (rank === 0) {
            el.style.transform = `scale(${maxScale})`;
            el.style.zIndex = 60;
            el.style.boxShadow = '0 60px 180px rgba(0,0,0,0.28)';
          } else if (rank <= k) {
            const t = 1 - (rank / (k + 1));
            const scale = 1 + (maxScale - 1) * Math.pow(t, exponent);
            const finalScale = Math.max(scale, minNeighborScale);
            el.style.transform = `scale(${finalScale})`;
            el.style.zIndex = 50 - rank;
            el.style.boxShadow = '0 40px 120px rgba(0,0,0,0.18)';
          } else {
            el.style.transform = '';
            el.style.zIndex = '';
            el.style.boxShadow = '';
          }
        });
      }

      function resetProximity() {
        boxes.forEach(b => {
          b.style.transform = '';
          b.style.zIndex = '';
          b.style.boxShadow = '';
        });
      }

      boxes.forEach(box => {
        box.addEventListener('mouseenter', () => applyProximity(box));
        box.addEventListener('mouseleave', () => resetProximity());
      });

      workPanel.addEventListener('mouseleave', () => resetProximity());
      // Recompute on window resize to keep rects accurate
      window.addEventListener('resize', () => { boxes = Array.from(workPanel.querySelectorAll('.work-box')); resetProximity(); });
    }

    // call setup after images are loaded into the panel
    setTimeout(() => {
      const wp = document.getElementById('workPanel');
      if (wp && wp.querySelectorAll('.work-box').length) setupProximityHover();
    }, 180);

    // lightbox removed; no overlay event handlers

    document.addEventListener('mousemove', event => {
      // don't enlarge the background image while a panel is open
      if (body.classList.contains('work-open') || body.classList.contains('about-open')) {
        body.classList.remove('image-hover');
        return;
      }

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const dx = event.clientX - centerX;
      const dy = event.clientY - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const threshold = Math.min(window.innerWidth, window.innerHeight) * 0.24;

      if (distance < threshold) {
        body.classList.add('image-hover');
      } else {
        body.classList.remove('image-hover');
      }
    });
  </script>
</body>
</html>
