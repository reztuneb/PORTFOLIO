<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAURENZ WEEKE</title>
  <link rel="icon" type="image/png" href="images/sliceanimatedream6verynice.png">
  <link rel="shortcut icon" type="image/png" href="images/sliceanimatedream6verynice.png">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background-color: #f2f2f2;
      color: #000000;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("images/sliceanimatedream6verynice.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 55%;
      background-color: #f2f2f2;
      z-index: -1;
      transition: filter 320ms ease, opacity 320ms ease, transform 320ms ease;
      transform-origin: center center;
    }

    body.image-hover::before {
      transform: scale(1.06);
    }

    body.work-open::before,
    body.about-open::before {
      filter: blur(10px);
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .page {
      padding: 3rem 4rem 4rem;
      width: min(360px, 34vw);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 1;
    }

    h1 {
      font-size: clamp(1.7rem, 3vw, 2rem);
      margin: 0;
      letter-spacing: 0.08em;
      color: #000000;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .link-button {
      font: inherit;
      color: #000000;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      font-weight: 800;
      font-size: clamp(0.95rem, 1.3vw, 1rem);
      text-transform: uppercase;
      transition: transform 180ms ease, color 180ms ease;
      position: relative;
    }

    .link-button:hover {
      transform: scale(1.08);
      color: #111111;
    }

    .link-button.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 3px;
      background: #000000;
      border-radius: 2px;
    }

    .panel-shell {
      position: relative;
      flex: 1;
      overflow: hidden;
      min-height: 100vh;
    }

    .panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 360px;
      padding: 3rem 4rem 4rem 4rem;
      opacity: 0;
      transform: translateX(40px);
      pointer-events: none;
      transition: opacity 320ms ease, transform 320ms ease;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    body.work-open .work-panel,
    body.about-open .about-panel {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .work-panel {
      display: grid;
      grid-template-columns: repeat(7, minmax(240px, 1fr));
      gap: 1.5rem;
      align-content: start;
      justify-content: center;
      justify-items: center;
      width: min(100%, 1960px);
      max-width: 1960px;
      padding-right: 3rem;
      margin: 0 auto;
      transform: none;
    }

    .work-box {
      width: 100%;
      max-width: 260px;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.12);
      background-clip: padding-box;
      padding: 0;
      cursor: pointer;
      transition: transform 280ms ease, box-shadow 280ms ease;
    }

    .work-box:hover {
      transform: scale(1.04);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.14);
    }

    .work-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 16px;
    }

    .about-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding-top: 6rem;
    }

    .about-card {
      width: min(920px, 85%);
      max-width: 980px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 18px;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.08);
      padding: 3rem;
      display: grid;
      gap: 1.75rem;
    }

    .about-hero {
      min-height: 42vh;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .about-photo {
      min-height: 18vh;
      width: 100%;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .panel::-webkit-scrollbar {
      width: 10px;
    }

    .panel::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 999px;
    }

    .panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .lightbox-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 280ms ease;
      z-index: 50;
    }

    .lightbox-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-card {
      width: min(92vw, 92vh);
      max-width: 1180px;
      max-height: 92vh;
      padding: 1rem;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      box-shadow: 0 50px 150px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-card img {
      width: 100%;
      height: auto;
      max-height: 88vh;
      border-radius: 24px;
      object-fit: contain;
      display: block;
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 2.2rem;
      height: 2.2rem;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      color: #000;
      font-size: 1.2rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
    }

    .lightbox-close:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
<div class="lightbox-overlay" id="lightboxOverlay">
  <div class="lightbox-card">
    <img id="lightboxImage" src="" alt="Expanded image">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">×</button>
  </div>
</div>
  <div class="container">
    <div class="page">
      <h1>LAURENZ WEEKE</h1>
      <div class="links">
        <button class="link-button" type="button" id="workButton">GALLERY</button>
        <button class="link-button" type="button" id="aboutButton">ABOUT</button>
      </div>
    </div>

      <div class="panel-shell">
      <div class="panel work-panel" id="workPanel"></div>

      <div class="panel about-panel" id="aboutPanel">
        <div class="about-card">
          <div class="about-hero"></div>
          <div class="about-photo"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const workButton = document.getElementById('workButton');
    const aboutButton = document.getElementById('aboutButton');
    const body = document.body;

    workButton.addEventListener('click', () => {
      const active = workButton.classList.toggle('active');
      aboutButton.classList.remove('active');
      body.classList.toggle('work-open', active);
      body.classList.remove('about-open');
    });

    aboutButton.addEventListener('click', () => {
      const active = aboutButton.classList.toggle('active');
      workButton.classList.remove('active');
      body.classList.toggle('about-open', active);
      body.classList.remove('work-open');
    });

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function openLightbox(src) {
      const overlay = document.getElementById('lightboxOverlay');
      const lightboxImage = document.getElementById('lightboxImage');
      overlay.classList.add('open');
      lightboxImage.src = src;
    }

    function closeLightbox() {
      const overlay = document.getElementById('lightboxOverlay');
      const lightboxImage = document.getElementById('lightboxImage');
      overlay.classList.remove('open');
      lightboxImage.src = '';
    }

    function loadGalleryImages() {
      fetch('images/gallery.json')
        .then(response => response.json())
        .then(filenames => {
          shuffleArray(filenames);
          const workPanel = document.getElementById('workPanel');
          filenames.forEach(name => {
            const box = document.createElement('div');
            box.className = 'work-box';
            box.addEventListener('click', () => openLightbox(`images/Gallery/${encodeURIComponent(name)}`));
            const img = document.createElement('img');
            img.src = encodeURI(`images/Gallery/${name}`);
            img.alt = 'Gallery image';
            img.title = '';
            img.loading = 'lazy';
            img.draggable = false;
            box.appendChild(img);
            workPanel.appendChild(box);
          });
        })
        .catch(() => {
          const workPanel = document.getElementById('workPanel');
          workPanel.textContent = 'Unable to load gallery images.';
        });
    }

    loadGalleryImages();

    const lightboxOverlay = document.getElementById('lightboxOverlay');
    const lightboxClose = document.getElementById('lightboxClose');
    lightboxOverlay.addEventListener('click', event => {
      if (event.target === lightboxOverlay || event.target === lightboxClose) {
        closeLightbox();
      }
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeLightbox();
      }
    });

    document.addEventListener('mousemove', event => {
      // don't enlarge the background image while a panel is open
      if (body.classList.contains('work-open') || body.classList.contains('about-open')) {
        body.classList.remove('image-hover');
        return;
      }

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const dx = event.clientX - centerX;
      const dy = event.clientY - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const threshold = Math.min(window.innerWidth, window.innerHeight) * 0.24;

      if (distance < threshold) {
        body.classList.add('image-hover');
      } else {
        body.classList.remove('image-hover');
      }
    });
  </script>
</body>
</html>
