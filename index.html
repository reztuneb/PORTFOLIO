<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAURENZ WEEKE</title>
  <link rel="icon" type="image/png" href="images/sliceanimatedream6verynice.png">
  <link rel="shortcut icon" type="image/png" href="images/sliceanimatedream6verynice.png">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background-color: #f2f2f2;
      color: #000000;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("images/sliceanimatedream6verynice.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 55%;
      background-color: #f2f2f2;
      z-index: -1;
      transition: filter 320ms ease, opacity 320ms ease, transform 320ms ease;
      transform-origin: center center;
    }

    body.image-hover::before {
      transform: scale(1.06);
    }

    body.work-open::before,
    body.about-open::before {
      filter: blur(10px);
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .page {
      padding: 3rem 4rem 4rem;
      width: min(360px, 34vw);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 1;
    }

    h1 {
      font-size: clamp(1.7rem, 3vw, 2rem);
      margin: 0;
      letter-spacing: 0.08em;
      color: #000000;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .link-button {
      font: inherit;
      color: #000000;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      font-weight: 800;
      font-size: clamp(0.95rem, 1.3vw, 1rem);
      text-transform: uppercase;
      transition: transform 180ms ease, color 180ms ease;
      position: relative;
    }

    .link-button:hover {
      transform: scale(1.08);
      color: #111111;
    }

    .link-button.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 3px;
      background: #000000;
      border-radius: 2px;
    }

    .panel-shell {
      position: relative;
      flex: 1;
      overflow: hidden;
      min-height: 100vh;
    }

    .panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 360px;
      padding: 3rem 6rem 4rem 4rem;
      opacity: 0;
      transform: translateX(40px);
      pointer-events: none;
      transition: opacity 320ms ease, transform 320ms ease;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    body.work-open .work-panel,
    body.about-open .about-panel {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .work-panel {
      display: grid;
      grid-template-columns: repeat(3, minmax(420px, 1fr));
      gap: 3.5rem;
      align-content: start;
      justify-content: center;
      justify-items: center;
      width: min(100%, 1740px);
      max-width: 1740px;
      padding-right: 4rem;
      margin: 0 auto;
      transform: none;
    }

    .work-box {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.12);
      background-clip: padding-box;
      padding: 0;
      transition: transform 280ms ease, box-shadow 280ms ease;
    }

    .work-box:hover {
      transform: scale(1.04);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.14);
    }

    .work-box:nth-child(1) { background: hsl(20, 50%, 92%); }
    .work-box:nth-child(2) { background: hsl(25, 48%, 92.5%); }
    .work-box:nth-child(3) { background: hsl(190, 42%, 93%); }
    .work-box:nth-child(4) { background: hsl(35, 46%, 92.5%); }
    .work-box:nth-child(5) { background: hsl(210, 44%, 93%); }
    .work-box:nth-child(6) { background: hsl(15, 52%, 92.2%); }
    .work-box:nth-child(7) { background: hsl(170, 43%, 92.4%); }
    .work-box:nth-child(8) { background: hsl(340, 40%, 92.5%); }
    .work-box:nth-child(9) { background: hsl(205, 47%, 92.3%); }
    .work-box:nth-child(10) { background: hsl(40, 45%, 92.5%); }
    .work-box:nth-child(11) { background: hsl(15, 41%, 93%); }
    .work-box:nth-child(12) { background: hsl(195, 44%, 92.6%); }
    .work-box:nth-child(13) { background: hsl(25, 43%, 92.4%); }
    .work-box:nth-child(14) { background: hsl(170, 38%, 92.7%); }
    .work-box:nth-child(15) { background: hsl(5, 46%, 92.5%); }
    .work-box:nth-child(16) { background: hsl(225, 42%, 92.6%); }
    .work-box:nth-child(17) { background: hsl(30, 45%, 92.4%); }
    .work-box:nth-child(18) { background: hsl(190, 47%, 92.6%); }
    .work-box:nth-child(19) { background: hsl(10, 50%, 92.1%); }
    .work-box:nth-child(20) { background: hsl(220, 43%, 92.5%); }

    .about-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding-top: 6rem;
    }

    .about-card {
      width: min(920px, 85%);
      max-width: 980px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 18px;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.08);
      padding: 3rem;
      display: grid;
      gap: 1.75rem;
    }

    .about-hero {
      min-height: 42vh;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .about-photo {
      min-height: 18vh;
      width: 100%;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .panel::-webkit-scrollbar {
      width: 10px;
    }

    .panel::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 999px;
    }

    .panel::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page">
      <h1>LAURENZ WEEKE</h1>
      <div class="links">
        <button class="link-button" type="button" id="workButton">GALLERY</button>
        <button class="link-button" type="button" id="aboutButton">ABOUT</button>
      </div>
    </div>

      <div class="panel-shell">
      <div class="panel work-panel" id="workPanel">
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
        <div class="work-box"></div>
      </div>

      <div class="panel about-panel" id="aboutPanel">
        <div class="about-card">
          <div class="about-hero"></div>
          <div class="about-photo"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const workButton = document.getElementById('workButton');
    const aboutButton = document.getElementById('aboutButton');
    const body = document.body;

    workButton.addEventListener('click', () => {
      const active = workButton.classList.toggle('active');
      aboutButton.classList.remove('active');
      body.classList.toggle('work-open', active);
      body.classList.remove('about-open');
    });

    aboutButton.addEventListener('click', () => {
      const active = aboutButton.classList.toggle('active');
      workButton.classList.remove('active');
      body.classList.toggle('about-open', active);
      body.classList.remove('work-open');
    });

    document.addEventListener('mousemove', event => {
      // don't enlarge the background image while a panel is open
      if (body.classList.contains('work-open') || body.classList.contains('about-open')) {
        body.classList.remove('image-hover');
        return;
      }

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const dx = event.clientX - centerX;
      const dy = event.clientY - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const threshold = Math.min(window.innerWidth, window.innerHeight) * 0.24;

      if (distance < threshold) {
        body.classList.add('image-hover');
      } else {
        body.classList.remove('image-hover');
      }
    });
  </script>
</body>
</html>
