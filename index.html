<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAURENZ WEEKE</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 3rem 4rem 4rem;
      background-color: #f2f2f2;
      color: #000000;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
      background-image: url("images/sliceanimatedream6verynice.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 38%;
    }

    h1 {
      font-size: clamp(2rem, 3.5vw, 2.4rem);
      margin: 0;
      letter-spacing: 0.08em;
      color: #000000;
      text-transform: uppercase;
      text-shadow: none;
    }

    .page {
      max-width: min(100%, 680px);
      width: 100%;
      text-align: left;
    }

    h1 {
      font-size: clamp(2.8rem, 5vw, 4rem);
      margin: 0;
      letter-spacing: 0.08em;
      color: #000000;
      text-transform: uppercase;
      text-shadow: none;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .link-button {
      font: inherit;
      color: #000000;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      font-weight: 800;
      font-size: clamp(1rem, 1.5vw, 1.1rem);
      text-transform: uppercase;
      transition: transform 180ms ease, color 180ms ease;
    }

    .link-button:hover {
      transform: scale(1.08);
      color: #111111;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>LAURENZ WEEKE</h1>
    <div class="links">
      <button class="link-button" type="button">WORK</button>
      <button class="link-button" type="button">ABOUT</button>
    </div>
  </div>
</body>
</html>
